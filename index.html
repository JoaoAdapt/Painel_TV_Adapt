<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Painel Adapt TV | MVP</title>
  <meta name="description" content="Painel corporativo de TV da Adapt Estratégias Digitais com indicadores, metas, cultura, conquistas, avisos e tarefas.">
  <meta property="og:title" content="Painel Adapt TV">
  <meta property="og:description" content="Dashboard executivo em tela cheia para acompanhamento interno da Adapt.">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0D0D0D;--accent:#2EAD8A;--card:#1A1A1A;--border:#2A2A2A;
      --text:#FFFFFF;--muted:#A0A0A0;--yellow:#FFD93D;--red:#FF4D4D;
      --purple:#B993FF;--blue:#6BB6FF;--gold:#FFD36E;--header:92px;
    }
    *{box-sizing:border-box}html,body{margin:0;width:100vw;height:100vh;overflow:hidden;background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif}
    body:before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 18% 10%,rgba(46,173,138,.18),transparent 28%),radial-gradient(circle at 82% 18%,rgba(185,147,255,.10),transparent 24%),radial-gradient(circle at 50% 100%,rgba(46,173,138,.08),transparent 35%);pointer-events:none;z-index:0}
    #stars{position:fixed;inset:0;z-index:1;opacity:.9}.app{position:relative;z-index:2;width:100vw;height:100vh;padding:28px 42px 36px}
    header{height:var(--header);display:flex;align-items:flex-start;justify-content:space-between;pointer-events:none}.logo{font-size:28px;font-weight:800;letter-spacing:-.04em}.logo span{color:var(--accent)}
    .timebox{text-align:right}.clock{font-size:36px;font-weight:800;letter-spacing:-.04em}.date{margin-top:4px;color:var(--muted);font-size:16px;font-weight:600;text-transform:capitalize}
    .slides{position:absolute;inset:calc(var(--header) + 18px) 42px 66px}.slide{position:absolute;inset:0;opacity:0;transform:translateY(14px);transition:opacity .8s ease,transform .8s ease;pointer-events:none}.slide.active{opacity:1;transform:none;pointer-events:auto}
    .slide-title{font-size:32px;font-weight:800;letter-spacing:-.04em;margin:0 0 22px}.subtle{color:var(--muted)}
    .card{background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.01)),var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 22px 60px rgba(0,0,0,.25);position:relative;overflow:hidden}
    .card:after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.045),transparent 38%);pointer-events:none}.metric-grid{display:grid;grid-template-columns:repeat(2,1fr);grid-template-rows:1fr 1fr 132px;gap:20px;height:100%}.metric-card{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px}.metric-card.wide{grid-column:1/-1;align-items:flex-start;padding:28px 34px;background:linear-gradient(110deg,rgba(46,173,138,.20),rgba(26,26,26,.94) 45%,rgba(46,173,138,.07))}
    .metric-number{font-size:clamp(76px,8.2vw,154px);font-weight:800;line-height:.86;letter-spacing:-.075em}.metric-label{margin-top:18px;color:var(--muted);font-size:24px;font-weight:700;text-transform:lowercase}.small-note{margin-top:14px;color:var(--muted);font-size:18px;font-weight:600}.accent{color:var(--accent)}.yellow{color:var(--yellow)}.red{color:var(--red)}
    .progress{width:100%;height:12px;margin-top:24px;background:#111;border:1px solid var(--border);border-radius:99px;overflow:hidden}.progress i{display:block;height:100%;width:0;background:var(--accent);border-radius:99px;transition:width .8s ease}.trend{position:absolute;top:22px;right:24px;font-size:34px;font-weight:800}.streak{display:flex;align-items:center;gap:18px;font-size:38px;font-weight:800;letter-spacing:-.04em}.streak .fire{font-size:54px;filter:drop-shadow(0 0 20px rgba(255,217,61,.25))}
    .sector-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;height:calc(100% - 62px)}.sector-card{padding:24px 28px}.sector-top{display:flex;justify-content:space-between;align-items:center;gap:18px}.sector-name{font-size:28px;font-weight:800}.status{font-size:17px;font-weight:800;padding:8px 12px;border-radius:999px;background:#111;border:1px solid var(--border)}.sector-meta{display:flex;justify-content:space-between;color:var(--muted);font-size:18px;font-weight:700;margin-top:20px}.sector-card blockquote{margin:20px 0 0;color:#d7d7d7;font-size:18px;font-style:italic;line-height:1.35}
    .culture-grid,.notice-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:22px;height:calc(100% - 62px)}.panel{padding:26px 28px}.panel h2{margin:0 0 20px;font-size:24px}.list{display:flex;flex-direction:column;gap:13px}.person,.compact-row,.task-row,.notice,.achievement{display:flex;align-items:center;gap:14px;padding:14px 16px;background:rgba(255,255,255,.035);border:1px solid var(--border);border-radius:14px}.avatar{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,rgba(46,173,138,.78),rgba(255,255,255,.08));font-weight:800;color:#fff;flex:0 0 auto}.person-info strong,.compact-row strong{display:block;font-size:18px}.person-info span,.compact-row span{display:block;margin-top:3px;color:var(--muted);font-size:15px;font-weight:600}.section-gap{margin-top:28px}.today{border-color:rgba(255,217,61,.65);box-shadow:0 0 0 1px rgba(255,217,61,.15),0 0 26px rgba(255,217,61,.08);animation:pulse .9s ease-in-out infinite alternate}.confetti-dot{position:absolute;width:6px;height:6px;background:var(--yellow);border-radius:50%;animation:float 1.6s ease-in-out infinite}.compact-row{justify-content:space-between}.compact-row em{color:#e8e8e8;font-style:normal;line-height:1.35;text-align:right;max-width:68%}
    .feed-wrap{height:calc(100% - 62px);padding:4px 4px 0;overflow:hidden}.feed-inner{display:flex;flex-direction:column;gap:14px}.feed-inner.scrolling{animation:scrollUp 24s linear infinite}.achievement{align-items:flex-start;padding:20px}.badge{width:48px;height:48px;border-radius:14px;display:grid;place-items:center;background:rgba(46,173,138,.12);font-size:24px;flex:0 0 auto}.achievement h3{margin:0;font-size:22px}.achievement p{margin:6px 0 0;color:#d8d8d8;font-size:18px;line-height:1.35}.achievement time{display:block;margin-top:10px;color:var(--muted);font-size:15px;font-weight:700}
    .notice-grid{grid-template-columns:1fr 1fr}.notice-list{height:calc(100% - 54px);overflow:hidden}.notice-inner{display:flex;flex-direction:column;gap:14px}.notice-inner.scrolling{animation:scrollUp 22s linear infinite}.notice{align-items:flex-start;font-size:19px;line-height:1.4}.notice.high{border-color:rgba(255,77,77,.72);box-shadow:0 0 0 1px rgba(255,77,77,.12)}.notice.normal{border-color:rgba(46,173,138,.55)}.priority{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px}.task-row{justify-content:space-between}.task-left{display:flex;align-items:center;gap:12px}.light{font-size:24px}.task-name{font-size:19px;font-weight:800}.task-meta{color:var(--muted);font-size:15px;font-weight:700}.task-score{font-size:19px;font-weight:800}
    .controls{position:absolute;z-index:4;left:50%;bottom:20px;transform:translateX(-50%);display:flex;align-items:center;gap:12px;padding:8px 10px;background:rgba(13,13,13,.38);border:1px solid rgba(255,255,255,.08);border-radius:999px;backdrop-filter:blur(10px)}.dots{display:flex;align-items:center;gap:10px}.dot,.nav-btn,.pause-btn{appearance:none;border:0;font-family:inherit;color:var(--text);cursor:pointer}.dot{width:9px;height:9px;padding:0;border-radius:50%;background:rgba(255,255,255,.24);transition:.35s}.dot.active{width:28px;background:var(--accent)}.nav-btn{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.07);font-size:28px;line-height:1;display:grid;place-items:center}.pause-btn{height:38px;padding:0 15px;border-radius:999px;background:rgba(46,173,138,.12);border:1px solid rgba(46,173,138,.35);font-size:14px;font-weight:800}.dot:hover,.nav-btn:hover,.pause-btn:hover{background:rgba(46,173,138,.22)}.dot:focus-visible,.nav-btn:focus-visible,.pause-btn:focus-visible{outline:2px solid var(--accent);outline-offset:3px}
    .overlay{position:fixed;inset:0;display:none;place-items:center;background:rgba(13,13,13,.90);z-index:20;text-align:center;padding:60px}.overlay.show{display:grid}.celebrate-card{position:relative;z-index:2;max-width:1040px;padding:54px 70px;border:1px solid rgba(46,173,138,.55);border-radius:28px;background:linear-gradient(135deg,rgba(46,173,138,.18),rgba(26,26,26,.92));box-shadow:0 0 90px rgba(46,173,138,.18)}.celebrate-card h2{font-size:52px;line-height:1.05;margin:0 0 22px;font-weight:800;letter-spacing:-.06em}.celebrate-card strong{display:block;font-size:94px;line-height:.92;color:var(--accent);letter-spacing:-.075em}#confetti{position:absolute;inset:0;width:100%;height:100%;z-index:1}
    @keyframes scrollUp{0%,10%{transform:translateY(0)}90%,100%{transform:translateY(calc(-50% - 7px))}}@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.012)}}@keyframes float{0%,100%{transform:translateY(0);opacity:.15}50%{transform:translateY(-12px);opacity:.9}}
    @media(max-width:1100px){.app{padding:22px}.slides{inset:110px 22px 60px}.metric-grid,.sector-grid,.culture-grid,.notice-grid{grid-template-columns:1fr}.metric-grid{grid-template-rows:repeat(4,1fr) 120px}.metric-number{font-size:64px}.sector-grid,.culture-grid,.notice-grid{overflow:hidden}.sector-card blockquote{font-size:16px}.celebrate-card strong{font-size:58px}.celebrate-card h2{font-size:34px}}
  </style>
</head>
<body>
  <canvas id="stars" aria-hidden="true"></canvas>
  <main class="app" aria-label="Painel corporativo Adapt TV">
    <header>
      <div class="logo" aria-label="Adapt">Adapt<span>°</span></div>
      <div class="timebox"><div class="clock" id="clock">--:--</div><div class="date" id="dateNow">Carregando data</div></div>
    </header>
    <section class="slides" id="slides" aria-live="polite"></section>
    <nav class="controls" aria-label="Controles do carrossel">
      <button class="nav-btn" id="prevSlide" type="button" aria-label="Tela anterior">‹</button>
      <div class="dots" id="dots" aria-label="Indicador de telas"></div>
      <button class="nav-btn" id="nextSlideBtn" type="button" aria-label="Próxima tela">›</button>
      <button class="pause-btn" id="pauseToggle" type="button" aria-pressed="false">⏸ Pausar</button>
    </nav>
  </main>
  <aside class="overlay" id="celebration" aria-live="assertive" aria-label="Novo contrato assinado">
    <canvas id="confetti"></canvas>
    <div class="celebrate-card"><h2>🎊 Novo cliente na família Adapt!</h2><strong id="clientName">Cliente</strong></div>
  </aside>
  <script>
    const SHEET_CSV_URL = ""; // Futuro: cole aqui a URL do Google Sheets publicado como CSV.
    const TIMERS = [30000,30000,25000,25000,20000];
    const DADOS = {
      mes:"Julho/2025", clientes_ativos:148, novos_clientes:5, meta_novos_clientes:6,
      clientes_sairam:3, meta_retencao:.95, retencao_realizada:.979, streak_retencao:4,
      metas_setor:[
        {setor:"Tráfego",meta:100,realizado:100,destaque:"Todas as contas otimizadas no prazo."},
        {setor:"CS",meta:50,realizado:47,destaque:"Renovação recorde em julho."},
        {setor:"Comercial",meta:6,realizado:5,destaque:"5 contratos fechados!"},
        {setor:"Social Media",meta:30,realizado:30,destaque:"Zero retrabalho em junho."},
        {setor:"Design",meta:80,realizado:72,destaque:""},
        {setor:"Audiovisual",meta:20,realizado:20,destaque:"Todos os vídeos entregues."}
      ],
      time:[
        {nome:"Amanda Souza",cargo:"CS / Gestora",aniversario:"15/07",entrada:"10/01/2022",foto:null},
        {nome:"João Silva",cargo:"Tráfego / Líder",aniversario:"22/07",entrada:"05/03/2021",foto:null},
        {nome:"Wesley Lima",cargo:"Diretor Comercial",aniversario:"08/11",entrada:"01/01/2019",foto:null}
      ],
      novos_membros:[{nome:"Carla Mendes",cargo:"Social Media",entrada:"20/06/2025",foto:null}],
      clientes:[{nome:"Koralle",inicio:"15/07/2022"},{nome:"Broilo Aquecimento",inicio:"10/03/2020"},{nome:"RS Consórcios",inicio:"01/07/2023"}],
      conquistas:[
        {tipo:"Novo Cliente",texto:"Koralle assinou contrato! Bem-vindos à família Adapt.",data:"07/07/2025"},
        {tipo:"Meta Batida",texto:"Tráfego bateu 100% da meta em junho!",data:"30/06/2025"},
        {tipo:"Depoimento",texto:"RS Consórcios deixou 5 estrelas no Google.",data:"05/07/2025"},
        {tipo:"Case Aprovado",texto:"Case de campanha B2B aprovado para apresentação interna.",data:"02/07/2025"},
        {tipo:"Conquista Interna",texto:"Design fechou a semana sem demandas críticas atrasadas.",data:"01/07/2025"}
      ],
      avisos:[
        {texto:"⚠️ Reunião geral amanhã às 14h — sala principal.",prioridade:"Alta",ativo:true},
        {texto:"🎉 Fechamos julho com recorde de novos clientes!",prioridade:"Normal",ativo:true},
        {texto:"📌 Atualizem o status das tarefas até sexta-feira às 16h.",prioridade:"Normal",ativo:true}
      ],
      tarefas:[
        {setor:"Tráfego",total:42,cumpridas:42,atrasadas:0},{setor:"CS",total:28,cumpridas:26,atrasadas:2},
        {setor:"Comercial",total:15,cumpridas:12,atrasadas:3},{setor:"Social Media",total:35,cumpridas:35,atrasadas:0},
        {setor:"Design",total:22,cumpridas:20,atrasadas:2},{setor:"Audiovisual",total:10,cumpridas:10,atrasadas:0}
      ],
      novos_contratos:[{cliente:"Koralle",celebrar:true,atualizado_em:"2025-07-07T10:00:00"}]
    };
    let dados = DADOS, active = 0, timerId = null, overlayOpen = false, isPaused = false;
    const $ = s => document.querySelector(s), fmtPct = v => (v*100).toLocaleString("pt-BR",{minimumFractionDigits:1,maximumFractionDigits:1})+"%";
    const parseBR = d => { const [day,mon,yr] = d.split("/").map(Number); return new Date(yr,mon-1,day); };
    const initials = name => name.split(" ").slice(0,2).map(p=>p[0]).join("").toUpperCase();
    const clamp = (n,min,max) => Math.max(min,Math.min(max,n));
    function colorClass(value,type){
      if(type==="retencao") return value>=.95?"accent":value>=.90?"yellow":"red";
      if(type==="churn") return value<=.05?"accent":value<=.10?"yellow":"red";
      return value>=1?"accent":value>=.8?"yellow":"red";
    }
    function statusFor(p){ if(p>=1) return {txt:"✅ Batida", cls:"accent"}; if(p>=.8) return {txt:"⏳ Em andamento", cls:"yellow"}; return {txt:"🔴 Aberta", cls:"red"}; }
    function daysAgo(dateStr){ const diff = Math.max(0, Math.round((new Date()-parseBR(dateStr))/86400000)); return diff===0?"hoje":diff===1?"há 1 dia":`há ${diff} dias`; }
    function avatar(p){ return p.foto?`<img class="avatar" src="${p.foto}" alt="Foto de ${p.nome}">`:`<div class="avatar" aria-hidden="true">${initials(p.nome)}</div>`; }
    function progress(width,color){ return `<div class="progress"><i style="width:${clamp(width*100,0,100)}%;background:${color||'var(--accent)'}"></i></div>`; }
    function renderPulse(){
      const churn = 1-dados.retencao_realizada, retentionClass = colorClass(dados.retencao_realizada,"retencao"), churnClass = colorClass(churn,"churn");
      const novosPct = dados.novos_clientes / dados.meta_novos_clientes, trend = dados.novos_clientes >= 4 ? "↗" : "↘";
      return `<article class="slide active"><div class="metric-grid">
        <div class="card metric-card"><div class="metric-number accent">${dados.clientes_ativos}</div><div class="metric-label">clientes ativos</div></div>
        <div class="card metric-card"><div class="metric-number ${retentionClass}">${fmtPct(dados.retencao_realizada)}</div><div class="metric-label">retenção</div>${progress(dados.retencao_realizada,`var(--${retentionClass==='accent'?'accent':retentionClass})`)}</div>
        <div class="card metric-card"><div class="metric-number ${churnClass}">${fmtPct(churn)}</div><div class="metric-label">churn</div><div class="small-note">${dados.clientes_sairam} clientes</div></div>
        <div class="card metric-card"><div class="trend ${novosPct>=1?'accent':'yellow'}">${trend}</div><div class="metric-number ${colorClass(novosPct,'meta')}">${dados.novos_clientes}</div><div class="metric-label">novos no mês</div><div class="small-note">meta: ${dados.meta_novos_clientes}</div>${progress(novosPct)}</div>
        <div class="card metric-card wide"><div class="streak"><span class="fire">🔥</span><span>${dados.streak_retencao} meses batendo a meta de retenção</span></div></div>
      </div></article>`;
    }
    function renderSectors(){
      return `<article class="slide"><h1 class="slide-title">Metas por setor <span class="subtle">• ${dados.mes}</span></h1><div class="sector-grid">${dados.metas_setor.map(s=>{
        const p = s.realizado/s.meta, st = statusFor(p); return `<div class="card sector-card"><div class="sector-top"><div class="sector-name">${s.setor}</div><div class="status ${st.cls}">${st.txt}</div></div><div class="sector-meta"><span>${s.realizado}/${s.meta}</span><span>${Math.round(p*100)}%</span></div>${progress(p,`var(--${st.cls==='accent'?'accent':st.cls})`)}<blockquote>${s.destaque||"Destaque em atualização pela gestão."}</blockquote></div>`;
      }).join("")}</div></article>`;
    }
    function renderCulture(){
      const now = new Date(), thisMonth = String(now.getMonth()+1).padStart(2,"0"), today = `${String(now.getDate()).padStart(2,"0")}/${thisMonth}`;
      const birthdays = dados.time.filter(p=>p.aniversario.endsWith(`/${thisMonth}`));
      const partners = dados.clientes.filter(c=>parseBR(c.inicio).getMonth()===now.getMonth()).map(c=>({...c,anos:now.getFullYear()-parseBR(c.inicio).getFullYear()}));
      const highlights = dados.metas_setor.filter(s=>s.destaque).map(s=>`<div class="compact-row"><strong>${s.setor}</strong><em>${s.destaque}</em></div>`).join("");
      return `<article class="slide"><div class="culture-grid">
        <div class="card panel"><h2>🎂 Aniversários do mês</h2><div class="list">${birthdays.map((p,i)=>`<div class="person ${p.aniversario===today?'today':''}">${p.aniversario===today?'<i class="confetti-dot" style="left:18px;top:10px"></i><i class="confetti-dot" style="right:30px;top:22px"></i>':''}${avatar(p)}<div class="person-info"><strong>${p.nome}</strong><span>${p.cargo} • ${p.aniversario}</span></div></div>`).join("")||'<div class="person"><div class="person-info"><strong>Nenhum aniversário cadastrado neste mês</strong><span>Atualize a planilha para preencher este bloco.</span></div></div>'}</div>
        <h2 class="section-gap">🤝 Aniversários de parceria</h2><div class="list">${partners.map(c=>`<div class="person"><div class="avatar">${initials(c.nome)}</div><div class="person-info"><strong>${c.nome}</strong><span>${c.anos} ${c.anos===1?'ano':'anos'} de parceria • ${c.inicio.slice(0,5)}</span></div></div>`).join("")}</div></div>
        <div class="card panel"><h2>👋 Novos membros do time</h2><div class="list">${dados.novos_membros.map(p=>`<div class="person">${avatar(p)}<div class="person-info"><strong>${p.nome}</strong><span>${p.cargo} • entrada em ${p.entrada}</span></div></div>`).join("")}</div><h2 class="section-gap">⭐ Destaque do mês por setor</h2><div class="list">${highlights}</div></div>
      </div></article>`;
    }
    const typeMap = {"Novo Cliente":["🆕","var(--accent)"],"Meta Batida":["🏆","var(--gold)"],"Depoimento":["⭐","var(--purple)"],"Case Aprovado":["📋","var(--blue)"],"Conquista Interna":["🎉","var(--accent)"]};
    function achievementCard(c){ const t=typeMap[c.tipo]||["✨","var(--accent)"]; return `<div class="achievement card"><div class="badge" style="color:${t[1]};border:1px solid ${t[1]}33">${t[0]}</div><div><h3>${c.tipo}</h3><p>${c.texto}</p><time>${daysAgo(c.data)}</time></div></div>`; }
    function renderAchievements(){ const cards = dados.conquistas.map(achievementCard).join(""); return `<article class="slide"><h1 class="slide-title">🏆 Mural de Conquistas</h1><div class="feed-wrap"><div class="feed-inner ${dados.conquistas.length>4?'scrolling':''}">${cards}${dados.conquistas.length>4?cards:""}</div></div></article>`; }
    function renderNotices(){
      const activeNotices = dados.avisos.filter(a=>a.ativo).sort((a,b)=>(a.prioridade==="Alta"?-1:1));
      const noticeCards = activeNotices.map(a=>`<div class="notice ${a.prioridade==='Alta'?'high':'normal'}"><div><div class="priority">${a.prioridade}</div>${a.texto}</div></div>`).join("");
      return `<article class="slide"><div class="notice-grid">
        <div class="card panel"><h2>📣 Avisos</h2><div class="notice-list"><div class="notice-inner ${activeNotices.length>3?'scrolling':''}">${noticeCards}${activeNotices.length>3?noticeCards:""}</div></div></div>
        <div class="card panel"><h2>📋 Situação das Tarefas</h2><div class="list">${dados.tarefas.map(t=>{const light=t.atrasadas===0?'🟢':t.atrasadas<=2?'🟡':'🔴';return `<div class="task-row"><div class="task-left"><span class="light">${light}</span><div><div class="task-name">${t.setor}</div><div class="task-meta">${t.atrasadas} atrasadas</div></div></div><div class="task-score">${t.cumpridas}/${t.total}</div></div>`}).join("")}</div></div>
      </div></article>`;
    }
    function render(){
      $("#slides").innerHTML = [renderPulse(),renderSectors(),renderCulture(),renderAchievements(),renderNotices()].join("");
      $("#dots").innerHTML = TIMERS.map((_,i)=>`<button class="dot ${i===active?'active':''}" type="button" aria-label="Ir para tela ${i+1}"></button>`).join("");
      bindDotControls(); updateActive(); checkCelebration();
    }
    function bindDotControls(){ document.querySelectorAll(".dot").forEach((d,i)=>d.onclick=()=>goToSlide(i,true)); }
    function updateControls(){ const b=$("#pauseToggle"); if(!b) return; b.textContent = isPaused ? "▶ Retomar" : "⏸ Pausar"; b.setAttribute("aria-pressed", String(isPaused)); }
    function updateActive(){ document.querySelectorAll(".slide").forEach((s,i)=>s.classList.toggle("active",i===active)); document.querySelectorAll(".dot").forEach((d,i)=>{d.classList.toggle("active",i===active);d.setAttribute("aria-current",i===active?"true":"false")}); updateControls(); }
    function goToSlide(index,manual=false){ if(overlayOpen) return; active = (index + TIMERS.length) % TIMERS.length; updateActive(); if(manual && isPaused) clearTimeout(timerId); else scheduleNext(); }
    function nextSlide(){ goToSlide(active+1,false); }
    function manualNext(){ goToSlide(active+1,true); }
    function manualPrev(){ goToSlide(active-1,true); }
    function setPaused(value){ isPaused = value; clearTimeout(timerId); if(!isPaused && !overlayOpen) scheduleNext(); updateControls(); }
    function scheduleNext(){ clearTimeout(timerId); if(isPaused || overlayOpen) return; timerId = setTimeout(nextSlide,TIMERS[active]); }
    async function refreshData(){
      if(!SHEET_CSV_URL){ render(); return; }
      try{ const csv = await fetch(SHEET_CSV_URL,{cache:"no-store"}).then(r=>r.text()); console.info("CSV recebido. Parse do Sheets deve mapear abas/colunas aqui.", csv.slice(0,120)); render(); }
      catch(e){ console.warn("Falha ao atualizar dados. Mantendo último estado.",e); }
    }
    function updateClock(){
      const now = new Date(); $("#clock").textContent = now.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
      $("#dateNow").textContent = now.toLocaleDateString("pt-BR",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});
    }
    function checkCelebration(){
      const next = dados.novos_contratos.find(c=>c.celebrar); if(!next) return;
      const key = `${next.cliente}|${next.atualizado_em||"sem-data"}`; if(sessionStorage.getItem("adaptCelebrated:"+key)) return;
      sessionStorage.setItem("adaptCelebrated:"+key,"1"); setTimeout(()=>showCelebration(next.cliente),900);
    }
    function showCelebration(client){ overlayOpen = true; clearTimeout(timerId); $("#clientName").textContent = client; $("#celebration").classList.add("show"); startConfetti(); setTimeout(()=>{ $("#celebration").classList.remove("show"); stopConfetti(); overlayOpen = false; scheduleNext(); },15000); }
    let confettiTimer=null;
    function startConfetti(){
      const canvas=$("#confetti"), ctx=canvas.getContext("2d"), colors=["#2EAD8A","#FFD93D","#FF4D4D","#B993FF","#6BB6FF"];
      let w,h,p=[]; const size=()=>{w=canvas.width=innerWidth;h=canvas.height=innerHeight}; size(); addEventListener("resize",size,{once:true});
      p=Array.from({length:180},()=>({x:Math.random()*w,y:-Math.random()*h,r:4+Math.random()*7,c:colors[Math.floor(Math.random()*colors.length)],v:2+Math.random()*4,a:Math.random()*Math.PI}));
      const draw=()=>{ctx.clearRect(0,0,w,h);p.forEach(o=>{o.y+=o.v;o.x+=Math.sin(o.a+=.03)*1.8;if(o.y>h+20){o.y=-20;o.x=Math.random()*w}ctx.save();ctx.translate(o.x,o.y);ctx.rotate(o.a);ctx.fillStyle=o.c;ctx.fillRect(-o.r/2,-o.r/2,o.r,o.r*.55);ctx.restore()});confettiTimer=requestAnimationFrame(draw)}; draw();
    }
    function stopConfetti(){ cancelAnimationFrame(confettiTimer); const c=$("#confetti"); c.getContext("2d").clearRect(0,0,c.width,c.height); }
    function startStars(){
      const canvas=$("#stars"), ctx=canvas.getContext("2d"); let w,h,stars=[]; const make=()=>{w=canvas.width=innerWidth;h=canvas.height=innerHeight;stars=Array.from({length:70},()=>({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.7+.35,a:.06+Math.random()*.14,s:.08+Math.random()*.22}))};
      make(); addEventListener("resize",make); const anim=()=>{ctx.clearRect(0,0,w,h);for(const st of stars){st.y+=st.s;if(st.y>h)st.y=0;ctx.beginPath();ctx.arc(st.x,st.y,st.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${st.a})`;ctx.fill()}requestAnimationFrame(anim)}; anim();
    }
    $("#prevSlide").onclick = manualPrev; $("#nextSlideBtn").onclick = manualNext; $("#pauseToggle").onclick = () => setPaused(!isPaused);
    document.addEventListener("keydown",e=>{ if(e.key==="ArrowLeft") manualPrev(); if(e.key==="ArrowRight") manualNext(); if(e.code==="Space"){ e.preventDefault(); setPaused(!isPaused); } });
    startStars(); updateClock(); setInterval(updateClock,1000); refreshData(); scheduleNext(); setInterval(refreshData,300000);
  </script>
</body>
</html>
